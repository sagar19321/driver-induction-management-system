    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

    /* ================= PREMIUM DESIGN SYSTEM ================= */
    :root {
      --ol-navy: #12172B; --ol-navy-2: #1B2437;
      --ol-surface: #F2F0EA; --ol-card: #FFFFFF;
      --ol-amber: #E8A33D; --ol-amber-2: #F0B254;
      --ol-teal: #2F9E7D; --ol-green: #2E6E44;
      --ol-ink: #1B2130; --ol-slate: #6B7280; --ol-border: #E7E4DA;
      --ol-shadow-sm: 0 1px 2px rgba(18,23,43,0.04), 0 4px 14px rgba(18,23,43,0.055);
      --ol-shadow-md: 0 2px 4px rgba(18,23,43,0.05), 0 12px 30px rgba(18,23,43,0.10);
      --ol-ease: cubic-bezier(.2,.7,.2,1);
    }
    .ol-root { font-family:'Inter',sans-serif; background:var(--ol-surface); color:var(--ol-ink); min-height:100vh; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; overflow-x:hidden; }
    .ol-root * { box-sizing:border-box; }
    .ol-root img { max-width:100%; }
    .ol-root ::selection { background:rgba(232,163,61,0.28); }
    .ol-display { font-family:'Barlow Condensed',sans-serif; letter-spacing:0.012em; }
    .ol-mono { font-family:'JetBrains Mono',monospace; }

    /* ---------- Layout ---------- */
    .ol-content-wrap { padding:26px 28px 40px; }
    .ol-dashboard-grid { grid-template-columns:1.4fr 1fr; }
    @media (max-width:900px){ .ol-dashboard-grid { grid-template-columns:1fr; } }
    @media (max-width:640px){ .ol-content-wrap { padding:16px 14px 30px; } .ol-btn { padding:8px 13px; font-size:12.5px; } }
    @media (max-width:420px){ .ol-content-wrap { padding:12px 10px 24px; } }

    .ol-page-enter { animation: olPageEnter .5s var(--ol-ease) both; }
    @keyframes olPageEnter { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }

    /* ---------- Topbar ---------- */
    .ol-topbar { background:rgba(255,255,255,0.82); backdrop-filter:blur(14px) saturate(1.25); -webkit-backdrop-filter:blur(14px) saturate(1.25); border-bottom:1px solid var(--ol-border); box-shadow:0 1px 0 rgba(255,255,255,0.6) inset, 0 6px 22px rgba(18,23,43,0.045); }
    .ol-pagetitle { position:relative; padding-bottom:7px; }
    .ol-pagetitle::after { content:''; position:absolute; left:0; bottom:0; width:30px; height:3px; border-radius:2px; background:linear-gradient(90deg, var(--ol-amber), var(--ol-teal)); }

    /* ---------- Buttons ---------- */
    .ol-btn { position:relative; display:inline-flex; align-items:center; gap:7px; font-family:'Inter',sans-serif; font-weight:600; font-size:13px; padding:9.5px 17px; border-radius:9px; border:1px solid transparent; cursor:pointer; white-space:nowrap; transition:transform .16s var(--ol-ease), box-shadow .16s var(--ol-ease), background .16s ease, border-color .16s ease, color .16s ease; }
    .ol-btn:hover:not(:disabled) { transform:translateY(-1px); }
    .ol-btn:active:not(:disabled) { transform:translateY(0); }
    .ol-btn:focus-visible { outline:none; box-shadow:0 0 0 3px rgba(232,163,61,0.35); }
    .ol-btn:disabled { opacity:0.45; cursor:not-allowed; }
    .ol-btn-primary { background:linear-gradient(180deg, var(--ol-navy-2), var(--ol-navy)); color:#F5F2E8; box-shadow:var(--ol-shadow-sm); }
    .ol-btn-primary:hover:not(:disabled) { box-shadow:0 6px 18px rgba(18,23,43,0.28); }
    .ol-btn-accent { background:linear-gradient(180deg, var(--ol-amber-2), var(--ol-amber)); color:var(--ol-navy); box-shadow:0 1px 2px rgba(18,23,43,0.06), 0 4px 14px rgba(232,163,61,0.28); }
    .ol-btn-accent:hover:not(:disabled) { box-shadow:0 8px 22px rgba(232,163,61,0.42); }
    .ol-btn-outline { background:rgba(255,255,255,0.7); color:var(--ol-ink); border-color:#D5D1C4; }
    .ol-btn-outline:hover:not(:disabled) { background:#FFFFFF; border-color:#BDB8A8; box-shadow:var(--ol-shadow-sm); }
    .ol-btn-danger { background:rgba(255,255,255,0.6); color:#9B3E28; border-color:#E4BAAC; }
    .ol-btn-danger:hover:not(:disabled) { background:#FBEDE9; box-shadow:0 4px 14px rgba(155,62,40,0.14); }
    .ol-btn-success { background:linear-gradient(180deg, #35804F, var(--ol-green)); color:#EDF5EE; box-shadow:var(--ol-shadow-sm); }
    .ol-btn-success:hover:not(:disabled) { box-shadow:0 6px 18px rgba(46,110,68,0.32); }
    .ol-btn-sm { padding:6px 12px; font-size:12px; border-radius:7px; }

    /* ---------- Cards & tickets ---------- */
    .ol-card { background:var(--ol-card); border:1px solid var(--ol-border); border-radius:14px; box-shadow:var(--ol-shadow-sm); }
    .ol-ticket { position:relative; background:var(--ol-card); border:1px solid var(--ol-border); border-radius:14px; box-shadow:var(--ol-shadow-sm); transition:box-shadow .22s var(--ol-ease), transform .22s var(--ol-ease); }
    .ol-ticket:hover { box-shadow:var(--ol-shadow-md); }
    .ol-ticket::before, .ol-ticket::after { content:''; position:absolute; width:16px; height:16px; background:var(--ol-surface); border:1px solid var(--ol-border); border-radius:50%; top:50%; transform:translateY(-50%); }
    .ol-ticket::before { left:-9px; border-right-color:transparent; }
    .ol-ticket::after { right:-9px; border-left-color:transparent; }

    .ol-kpi { position:relative; overflow:hidden; transition:box-shadow .22s var(--ol-ease), transform .22s var(--ol-ease); }
    .ol-kpi::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg, var(--ol-amber), var(--ol-teal)); }
    .ol-kpi:hover { transform:translateY(-2px); box-shadow:var(--ol-shadow-md); }

    /* ---------- Forms ---------- */
    .ol-input, .ol-select, .ol-textarea { width:100%; font-family:'Inter',sans-serif; font-size:14px; padding:10px 13px; border:1px solid #D8D4C8; border-radius:9px; background:#FFFFFF; color:var(--ol-ink); outline:none; transition:border-color .15s ease, box-shadow .15s ease; }
    .ol-input:hover, .ol-select:hover, .ol-textarea:hover { border-color:#C2BDAC; }
    .ol-input:focus, .ol-select:focus, .ol-textarea:focus { border-color:var(--ol-amber); box-shadow:0 0 0 3.5px rgba(232,163,61,0.16); }
    .ol-label { display:block; font-size:11.5px; font-weight:600; color:#77705F; margin-bottom:6px; text-transform:uppercase; letter-spacing:0.05em; }

    /* ---------- Badges & stamps ---------- */
    .ol-badge { display:inline-flex; align-items:center; gap:5px; font-family:'JetBrains Mono',monospace; font-size:10.5px; font-weight:600; padding:4.5px 11px; border-radius:999px; border:1px solid; text-transform:uppercase; letter-spacing:0.04em; white-space:nowrap; }
    .ol-stamp { transform:rotate(-3deg); border:2.5px solid currentColor; border-radius:8px; padding:3px 12px; font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:13px; text-transform:uppercase; letter-spacing:0.08em; display:inline-block; opacity:0.9; }

    /* ---------- Sidebar ---------- */
    .ol-sidebar-link { display:flex; align-items:center; gap:11px; padding:10.5px 14px; border-radius:9px; color:#AEB4C2; font-size:13.5px; font-weight:500; cursor:pointer; transition:all .18s var(--ol-ease); border-left:3px solid transparent; }
    .ol-sidebar-link:hover { background:rgba(255,255,255,0.06); color:#F3E8D0; transform:translateX(2px); }
    .ol-sidebar-link.active { background:linear-gradient(90deg, rgba(232,163,61,0.16), rgba(232,163,61,0.05)); color:var(--ol-amber); border-left-color:var(--ol-amber); box-shadow:inset 0 1px 0 rgba(255,255,255,0.05); }

    /* ---------- Tables ---------- */
    .ol-table th { text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:0.07em; color:#8A8471; font-weight:600; padding:12px 16px; border-bottom:1px solid var(--ol-border); background:#FAF9F4; }
    .ol-table th:first-child { border-top-left-radius:14px; }
    .ol-table th:last-child { border-top-right-radius:14px; }
    .ol-table td { padding:13px 16px; border-bottom:1px solid #F0EDE3; font-size:13.5px; transition:background .12s ease; }
    .ol-table tr:last-child td { border-bottom:none; }
    .ol-table tbody tr:hover td { background:#FBF7EC; }
    .ol-table tbody tr:hover td:first-child { box-shadow:inset 3px 0 0 var(--ol-amber); }

    /* ---------- Checklist ---------- */
    .ol-checklist-item { display:flex; align-items:center; gap:10px; padding:10.5px 13px; border:1px solid var(--ol-border); border-radius:10px; background:#FFFFFF; cursor:pointer; transition:border-color .15s ease, background .15s ease, box-shadow .15s ease; }
    .ol-checklist-item:hover { border-color:#CFC9B8; box-shadow:var(--ol-shadow-sm); }
    .ol-checklist-item.checked { background:#EAF5EE; border-color:#BFE0CB; }

    /* ---------- Scrollbar ---------- */
    .ol-scrollbar::-webkit-scrollbar { width:7px; height:7px; }
    .ol-scrollbar::-webkit-scrollbar-thumb { background:#CDC8B8; border-radius:4px; }
    .ol-scrollbar::-webkit-scrollbar-thumb:hover { background:#B8B2A0; }

    /* ---------- Screen watermark ---------- */
    .ol-watermark { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; z-index:0; }
    .ol-watermark img { width:min(46vw, 420px); opacity:0.07; mix-blend-mode:multiply; filter:saturate(0.85); }
    @media (min-width:860px){ .ol-watermark { left:220px; } }

    @media (prefers-reduced-motion: reduce) {
      .ol-page-enter, .ol-btn, .ol-ticket, .ol-kpi, .ol-sidebar-link { animation:none !important; transition:none !important; }
    }

    /* ---------- Print ---------- */
    .ol-print-watermark { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) rotate(-14deg); width:62%; opacity:0.055; mix-blend-mode:multiply; pointer-events:none; }
    .ol-print-sectionlabel { font-size:10.5px; font-weight:700; color:#8A5A16; text-transform:uppercase; letter-spacing:0.08em; margin:18px 0 10px; padding-bottom:5px; border-bottom:1.5px solid #E8A33D; }
    @media print {
      .no-print { display:none !important; }
      @page { size:A4; margin:12mm; }
      html, body { margin:0 !important; padding:0 !important; overflow:visible !important; height:auto !important; }
      * { -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
      body.ol-print-doc * { visibility:hidden; }
      body.ol-print-doc .print-area, body.ol-print-doc .print-area * { visibility:visible; }
      body.ol-print-doc .ol-print-overlay { position:static !important; padding:0 !important; background:white !important; display:block !important; }
      body.ol-print-doc .ol-print-box { position:static !important; max-height:none !important; overflow:visible !important; box-shadow:none !important; border-radius:0 !important; max-width:100% !important; }
      body.ol-print-doc .print-area { position:absolute !important; left:0 !important; top:0 !important; width:100% !important; margin:0 !important; }
